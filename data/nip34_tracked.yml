# NIP-34 Repository Tracking
# Projects with known NIP-34 (git-over-nostr) repositories
#
# These repos are actively monitored for patches (kind 1617),
# issues (kind 1621), and repo updates (kind 30617).
#
# Fields:
#   name:       Project name (should match projects.yml where applicable)
#   d_tag:      The NIP-34 "d" tag identifier for the repo
#   pubkey:     Hex pubkey of the repo maintainer (for filtering)
#   relays:     Preferred relays for this repo
#   in_projects_yml: Whether this project is also tracked in projects.yml
#   notes:      Optional context
#
# To find a project's d_tag and pubkey, query:
#   nak req -k 30617 --limit 100 wss://relay.ngit.dev | jq 'select(.tags[][] == "PROJECT_NAME")'

