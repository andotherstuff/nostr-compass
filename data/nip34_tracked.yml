# Noise filtering is handled in scripts/fetch_nip34_repos.sh:
#   - NOISE_PUBKEYS array: known noise pubkeys (hardcoded, with comments)
#   - filter_noise() function: d_tag patterns, clone URL patterns
#
# To add a noise pubkey or pattern, edit the script directly.
# To identify new noise sources, run:
#   ./scripts/fetch_nip34_repos.sh --discover-only --since-days 30
# and look for pubkeys with many unrelated repos.
