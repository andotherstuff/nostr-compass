# Non-GitHub Project Updates
# Manual tracking for projects hosted on Codeberg, Sourcehut, or other platforms
# that the GitHub fetch script cannot reach.
#
# Update this file weekly before newsletter generation.
# Format: list entries under each platform with date, project, type, and description.
#
# Last updated: 2026-04-15

codeberg:
  # ngit - Git collaboration over Nostr (NIP-34)
  # Repo: https://codeberg.org/DanConwayDev/ngit-cli
  - project: ngit
    repo: https://codeberg.org/DanConwayDev/ngit-cli
    updates: []
