{{ define "main" }}
<article class="post">
  <meta data-pagefind-filter="type:{{ .Section | default "page" }}">
  <meta data-pagefind-sort="date:{{ .Date.Format "2006-01-02" }}">
  <meta data-pagefind-meta="date:{{ .Date.Format "Jan 2, 2006" }}">
  {{ if .Title }}
  <header class="post-header">
    <h1 class="post-title" data-pagefind-weight="8">{{ .Title }}</h1>
  </header>
  {{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
