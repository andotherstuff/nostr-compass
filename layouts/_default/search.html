{{ define "head" }}
  <link rel="stylesheet" href="{{ "/pagefind/pagefind-ui.css" | relURL }}">
{{ end }}

{{ define "main" }}
<article class="post search-page">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    <p class="search-intro">{{ i18n "search_intro" }}</p>
    <noscript>
      <p>{{ i18n "search_javascript_required" }}</p>
    </noscript>
    <div class="search-shell">
      <div id="search"></div>
    </div>
  </div>
</article>

<script src="{{ "/pagefind/pagefind-ui.js" | relURL }}" defer></script>
<script>
  window.addEventListener("DOMContentLoaded", function () {
    var container = document.getElementById("search");
    var placeholder = {{ i18n "search_placeholder" | jsonify | safeJS }};
    var missingMessage = {{ i18n "search_assets_missing" | jsonify | safeJS }};

    if (!container) {
      return;
    }

    if (!window.PagefindUI) {
      container.innerHTML = "<p>" + missingMessage + "</p>";
      return;
    }

    new window.PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: false,
      excerptLength: 18,
      resetStyles: false,
      highlightParam: "highlight",
      processTerm: function (term) {
        // Normalize compound terms so "whitenoise" matches "white noise" etc.
        var compounds = [
          [/whitenoise/gi, "white noise"],
          [/nostr\s*compass/gi, "nostr compass"],
          [/nostrudel/gi, "nostrudel"],
          [/nostr[\s-]*tools/gi, "nostr-tools"],
          [/lnbits/gi, "ln bits"],
          [/cashu[\s-]*ts/gi, "cashu-ts"],
          [/nip[\s-]*(\d+)/gi, "nip-$1"],
          [/weboftrust/gi, "web of trust"],
          [/gossipprotocol/gi, "gossip protocol"]
        ];
        for (var i = 0; i < compounds.length; i++) {
          term = term.replace(compounds[i][0], compounds[i][1]);
        }
        return term;
      },
      ranking: {
        termFrequency: 0.8,
        pageLength: 0.5,
        termSaturation: 1.4,
        termSimilarity: 1.0
      },
      translations: {
        placeholder: placeholder
      }
    });
  });
</script>
{{ end }}
